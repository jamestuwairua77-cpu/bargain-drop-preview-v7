<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--accent:#111;--red:#e60023;--green:#10b981;--amber:#f59e0b;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem;position:sticky;top:0;z-index:110}
.top-bar a{color:#fff}
.profile-header{padding:24px 16px;text-align:center;background:linear-gradient(135deg,#fafafa,#f0f0f0)}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f97316);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:2rem;font-weight:900;color:#fff}
.profile-name{font-size:1.1rem;font-weight:800}
.profile-email{font-size:0.75rem;color:var(--muted);margin-top:2px}
.profile-actions{display:flex;gap:8px;justify-content:center;margin-top:12px}
.btn-sm{padding:8px 18px;border-radius:20px;font-size:0.72rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-outline-sm{background:#fff;border:1.5px solid var(--line);color:var(--fg)}
.btn-outline-sm:hover{background:#f5f5f5}
.btn-dark-sm{background:var(--accent);color:#fff}
.btn-dark-sm:hover{opacity:.9}
.section{padding:16px}
.section-title{font-size:0.82rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.order-status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.order-status-grid.extra-row{grid-template-columns:repeat(2,1fr)}
.status-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:12px;border:1.5px solid var(--line);cursor:pointer;transition:all .15s;background:#fff;text-decoration:none;color:inherit}
.status-card:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.status-card .status-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.status-card .status-label{font-size:0.68rem;font-weight:600}
.status-card .status-count{font-size:0.62rem;color:var(--muted)}
.status-card.unpaid .status-icon{background:#fef2f2;color:var(--red)}
.status-card.processing .status-icon{background:#fffbeb;color:var(--amber)}
.status-card.shipped .status-icon{background:#eff6ff;color:var(--blue)}
.status-card.review .status-icon{background:#ecfdf5;color:var(--green)}
.status-card.return .status-icon{background:#faf5ff;color:#7c3aed}
.services-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.service-card{display:flex;align-items:center;gap:10px;padding:14px;border-radius:12px;border:1.5px solid var(--line);cursor:pointer;transition:all .15s;background:#fff;text-decoration:none;color:inherit}
.service-card:hover{background:#fafafa;border-color:#ddd}
.service-card .svc-icon{width:36px;height:36px;border-radius:10px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.service-card .svc-label{font-size:0.72rem;font-weight:600}
.service-card .svc-arrow{font-size:0.8rem;color:var(--muted);margin-left:auto}
.menu-list{background:#fff;border-radius:12px;border:1.5px solid var(--line);overflow:hidden}
.menu-item{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid #f5f5f5;text-decoration:none;color:inherit}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:#fafafa}
.menu-item .mi-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted)}
.menu-item .mi-label{flex:1;font-size:0.78rem;font-weight:500}
.menu-item .mi-arrow{font-size:0.8rem;color:var(--muted)}
.divider{height:1px;background:var(--line);margin:8px 0}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active{color:var(--fg)}
.bottom-nav .nav-icon{width:20px;height:20px;flex-shrink:0}
</style>
</head>
<body>
<div class="top-bar"><a href="index.html">&#x2190; Home</a><div>Free Shipping $29+</div></div>
<div class="profile-header">
<div class="profile-avatar" id="avatar">G</div>
<div class="profile-name" id="profile-name">Guest</div>
<div class="profile-email" id="profile-email">Sign in for exclusive deals</div>
<div class="profile-actions" id="profile-actions">
<a href="sign-in.html"><button class="btn-sm btn-dark-sm">Sign In</button></a>
<a href="register.html"><button class="btn-sm btn-outline-sm">Register</button></a>
</div>
</div>
<div class="section">
<div class="section-title"><svg width="18" height="18" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2" stroke="#555" stroke-width="1.8" fill="none"/><path d="M16 8h4l3 5v5a2 2 0 01-2 2h-1" stroke="#555" stroke-width="1.8" fill="none"/><circle cx="7" cy="19" r="2" stroke="#555" stroke-width="1.8" fill="none"/><circle cx="17" cy="19" r="2" stroke="#555" stroke-width="1.8" fill="none"/></svg> My Orders</div>
<div class="order-status-grid">
<a href="orders.html?status=unpaid" class="status-card unpaid"><div class="status-icon">!</div><div class="status-label">Unpaid</div><div class="status-count">0 orders</div></a>
<a href="orders.html?status=processing" class="status-card processing"><div class="status-icon">&#x23F3;</div><div class="status-label">Processing</div><div class="status-count">0 orders</div></a>
<a href="orders.html?status=shipped" class="status-card shipped"><div class="status-icon">&#x1F69A;</div><div class="status-label">Shipped</div><div class="status-count">0 orders</div></a>
</div>
<div class="order-status-grid extra-row">
<a href="orders.html?status=review" class="status-card review"><div class="status-icon">&#x2B50;</div><div class="status-label">Review</div><div class="status-count">0 orders</div></a>
<a href="orders.html?status=return" class="status-card return"><div class="status-icon">&#x21A9;&#xFE0F;</div><div class="status-label">Return</div><div class="status-count">0 orders</div></a>
</div>
</div>
<div class="divider"></div>
<div class="section">
<div class="section-title"><svg width="18" height="18" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="#555" stroke-width="1.8" fill="none"/></svg> More Services</div>
<div class="services-grid">
<a href="customer-service.html" class="service-card"><div class="svc-icon">&#x1F4AC;</div><span class="svc-label">Customer Service</span><span class="svc-arrow">&#x2192;</span></a>
<a href="policy.html" class="service-card"><div class="svc-icon">&#x1F6E1;&#xFE0F;</div><span class="svc-label">Policies</span><span class="svc-arrow">&#x2192;</span></a>
</div>
</div>
<div class="divider"></div>
<div class="section">
<div class="menu-list">
<a href="settings.html" class="menu-item"><span class="mi-icon">&#x2699;&#xFE0F;</span><span class="mi-label">Settings</span><span class="mi-arrow">&#x2192;</span></a>
</div>
</div>
<nav class="bottom-nav">
<a href="index.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="profile.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>
(function(){var u=localStorage.getItem('bd_user');if(u){try{u=JSON.parse(u)}catch(e){u=null}if(u&&u.signedIn){document.getElementById('avatar').textContent=(u.name||'U')[0].toUpperCase();document.getElementById('profile-name').textContent=u.name||'User';document.getElementById('profile-email').textContent=u.email||'';document.getElementById('profile-actions').innerHTML='<button class="btn-sm btn-outline-sm" onclick="signOut()">Sign Out</button>'}}})();
function signOut(){localStorage.removeItem('bd_user');window.location.reload()}
</script>
</body>
</html>
