<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--accent:#111;--red:#e60023}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem}
.top-bar a{color:#fff;text-decoration:none}
.container{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:380px;padding:32px 24px;border-radius:16px;border:1px solid var(--line)}
.card h1{font-size:1.4rem;font-weight:800;margin-bottom:4px;text-align:center}
.card .sub{text-align:center;font-size:0.78rem;color:var(--muted);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.75rem;font-weight:600;margin-bottom:6px}
.form-group input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:0.85rem;outline:none;transition:border .15s}
.form-group input:focus{border-color:var(--fg)}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;margin-bottom:12px}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:#fff;border:1.5px solid var(--line);color:var(--fg)}
.btn-outline:hover{background:#f5f5f5}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:var(--muted);font-size:0.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.footer-text{text-align:center;font-size:0.75rem;color:var(--muted);margin-top:16px}
.footer-text a{color:var(--fg);font-weight:600;text-decoration:underline}
.back-link{text-align:center;margin-top:20px}
.back-link a{color:var(--muted);font-size:0.8rem;text-decoration:none}
.back-link a:hover{color:var(--fg)}
.error{background:#fef2f2;color:var(--red);padding:10px 14px;border-radius:8px;font-size:0.75rem;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="top-bar"><a href="index.html">← Back to Home</a><div>Free Shipping $29+</div></div>
<div class="container">
<div class="card">
<h1>Welcome Back</h1>
<p class="sub">Sign in to your Bargain Drop account</p>
<div class="error" id="error">Invalid email or password</div>
<div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com"></div>
<div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••"></div>
<button class="btn btn-primary" onclick="signIn()">Sign In</button>
<button class="btn btn-outline" onclick="location.href='register.html'">Create New Account</button>
<div class="divider">or</div>
<button class="btn btn-outline" onclick="signIn()">Continue as Guest</button>
<p class="footer-text">By signing in you agree to our <a href="policy.html">Terms</a> and <a href="policy.html">Privacy Policy</a></p>
</div>
</div>
<div class="back-link"><a href="index.html">← Back to Home</a></div>
<script>
function signIn(){
  var email=document.getElementById('email').value.trim();
  var pass=document.getElementById('password').value.trim();
  if(!email){showErr('Please enter your email');return}
  if(!pass){showErr('Please enter your password');return}
  localStorage.setItem('bd_user',JSON.stringify({email:email,name:email.split('@')[0],signedIn:true}));
  window.location.href='profile.html';
}
function showErr(m){var e=document.getElementById('error');e.textContent=m;e.style.display='block'}
</script>
</body>
</html>
