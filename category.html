<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Category — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem;position:sticky;top:0;z-index:110}
.top-bar a{color:#fff}
.back-btn{display:flex;align-items:center;gap:4px;font-size:0.78rem;cursor:pointer;font-weight:600}
.cat-header{padding:16px;text-align:center;border-bottom:1px solid var(--line)}
.cat-header h1{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.cat-header .breadcrumb{font-size:0.7rem;color:var(--muted);margin-bottom:6px}
.cat-header .breadcrumb a{color:var(--muted);text-decoration:underline}
.subcat-section{padding:12px 16px}
.subcat-section h3{font-size:0.85rem;font-weight:700;margin-bottom:10px}
.subcat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.subcat-card{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f8f8f8;border-radius:10px;transition:all 0.15s;border:1px solid transparent}
.subcat-card:hover{background:#f0f0f0;border-color:var(--line)}
.subcat-thumb{width:34px;height:34px;border-radius:8px;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:var(--muted);flex-shrink:0;overflow:hidden}
.subcat-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.subcat-name{flex:1;font-size:0.72rem;font-weight:500;line-height:1.2}
.subcat-badge{font-size:0.62rem;color:var(--muted);background:#e0e0e0;padding:2px 7px;border-radius:10px;flex-shrink:0}
.product-section{padding:12px 16px}
.product-section h3{font-size:0.85rem;font-weight:700;margin-bottom:10px}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.product-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--line);transition:0.15s}
.product-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.product-card .prod-img{aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden}
.product-card .prod-img img{width:100%;height:100%;object-fit:cover}
.product-card .prod-img .no-img{font-size:3rem;color:#ccc}
.product-card .prod-info{padding:8px 10px 10px}
.product-card .prod-title{font-size:0.72rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.product-card .prod-price-row{display:flex;align-items:center;gap:6px}
.product-card .prod-price{font-size:0.85rem;font-weight:800;color:var(--red)}
.product-card .prod-compare{font-size:0.65rem;color:var(--muted);text-decoration:line-through}
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a:hover,.bottom-nav a.active{color:var(--fg)}
.nav-icon{width:20px;height:20px;flex-shrink:0}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}.subcat-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="top-bar"><a href="categories.html" class="back-btn">← Categories</a><div>Free $29+</div></div>
<div id="loading" class="loading"><div class="spinner"></div><p>Loading category...</p></div>
<div id="content" style="display:none">
<div class="cat-header"><div class="breadcrumb"><a href="/">Home</a> → <a href="categories.html">Categories</a> → <span id="cat-name-breadcrumb"></span></div><h1 id="cat-title"></h1><p id="cat-count" style="font-size:0.75rem;color:var(--muted)"></p></div>
<div class="subcat-section" id="subcat-section"><h3>Subcategories</h3><div class="subcat-grid" id="subcat-grid"></div></div>
<div class="product-section"><h3>All Products</h3><div class="product-grid" id="product-grid"></div></div>
</div>
<nav class="bottom-nav">
<a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="#"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>
async function load(){
var params=new URLSearchParams(window.location.search);
var catName=params.get('cat');
if(!catName){document.getElementById('loading').innerHTML='<div style="text-align:center;padding:60px"><p>No category specified</p><br><a href="categories.html">Back</a></div>';return}
try{
var resp=await fetch('categories-data.json');
var data=await resp.json();
var cat=data[catName];
if(!cat){throw new Error('Category not found')}
document.getElementById('loading').style.display='none';
document.getElementById('content').style.display='block';
document.title=catName+' — Bargain Drop';
document.getElementById('cat-title').textContent=(cat.emoji||'')+' '+catName;
document.getElementById('cat-name-breadcrumb').textContent=catName;
document.getElementById('cat-count').textContent=cat.total_products+' products • '+(cat.subcategories||[]).length+' subcategories';
var subGrid=document.getElementById('subcat-grid');
(cat.subcategories||[]).forEach(function(sub){
var thumb='<span>'+((sub.title||'?')[0])+'</span>';
subGrid.innerHTML+='<a href="subcategory.html?handle='+encodeURIComponent(sub.handle)+'" class="subcat-card"><div class="subcat-thumb">'+thumb+'</div><span class="subcat-name">'+esc(sub.title)+'</span><span class="subcat-badge">'+sub.product_count+'</span></a>';
});
if((cat.subcategories||[]).length===0){document.getElementById('subcat-section').style.display='none'}
var pGrid=document.getElementById('product-grid');
var prods=cat.products||[];
if(prods.length===0){pGrid.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);grid-column:1/-1"><p>No products yet</p></div>'}else{
prods.forEach(function(p){
var imgHtml=p.image?'<img src="'+p.image+'" alt="" loading="lazy">':'<span class="no-img"></span>';
var card=document.createElement('a');card.className='product-card';card.href='product.html?id='+p.id;
card.innerHTML='<div class="prod-img">'+imgHtml+'</div><div class="prod-info"><div class="prod-title">'+esc(p.title)+'</div><div class="prod-price-row"><span class="prod-price">$'+(p.price||0).toFixed(2)+'</span><span class="prod-compare">$'+(p.compare_at_price||0).toFixed(2)+'</span></div></div>';
pGrid.appendChild(card);
});}
}catch(e){document.getElementById('loading').innerHTML='<div style="text-align:center;padding:60px"><p>Error: '+e.message+'</p><br><a href="categories.html">Back</a></div>'}
}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
load();
</script>
</body>
</html>
